<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes liquidFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .liquid-bg-animate {
            background-size: 200% 200%;
            animation: liquidFlow 15s ease infinite;
        }

        .glass-panel {
            backdrop-filter: blur(24px);
            background: rgba(28, 27, 27, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vytalix-watermark {
            user-select: none;
            pointer-events: none;
        }

        input:focus {
            box-shadow: 0 0 15px rgba(0, 219, 233, 0.3);
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(0, 219, 233, 0.5);
        }

<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden selection:bg-primary-fixed-dim/30">
<main class="flex h-screen w-full relative">
<!-- Left Side: Cinematic Visualization -->
<section class="hidden lg:flex lg:w-3/5 relative overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Vytalix Visual" class="w-full h-full object-cover liquid-bg-animate brightness-75 scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvkACPfQK-TT7VJ79AnVsCwXbCL1s6CzGez6vM3UVi2AkMi7YW_KKJOqt1hdI5Oyngjzn9_eWabR6zL2i5FXptvhMQlwjzb7zdxydzGJjfKHhMdEo0V1aFhqQz1HEfFGk-XcogSBY0oG6-zuj6rLiAs-2VkZV_buQgA3hNaJ8LYiUtTqSR1bxrNScPPRSqWqC6Wi6xBlhDe0jd8HFBRwpqDUKhb5OvqVAx-QdjOYQqNn7-cwyankoFAmeW8ST6Gz3vqzLjJ5ShdZ8"/>
</div>
<!-- Overlay Gradient for Depth -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-background/20 to-background z-10"></div>
<!-- Branding Overlay -->
<div class="absolute bottom-margin-desktop left-margin-desktop z-20 fade-in-up" style="animation-delay: 0.2s;">

<p class="font-label-caps text-label-caps text-primary-fixed-dim opacity-80 uppercase">The biological operating system</p>
</div>
</section>
<!-- Right Side: Login Panel -->
<section class="w-full lg:w-2/5 flex items-center justify-center relative p-margin-mobile md:p-margin-desktop bg-background z-20">
<!-- Background Giant Typography (Lumen Style) -->
<div class="vytalix-watermark absolute inset-0 flex items-center justify-center z-0">
<span class="font-display-2xl text-[20vw] lg:text-[12vw] font-black text-on-surface opacity-[0.02] tracking-widest">VYTALIX</span>
</div>
<!-- Login Card -->
<div class="glass-panel w-full max-w-md p-10 rounded-xl relative z-10 fade-in-up" style="animation-delay: 0.4s;">
<header class="mb-10">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome back</h2>
<p class="font-body-md text-on-surface-variant">to the future of you.</p>
</header>
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="group">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2 transition-colors group-focus-within:text-primary-fixed-dim" for="email">ID ENTITY / EMAIL</label>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant py-4 px-0 text-on-surface focus:ring-0 focus:border-primary-fixed-dim transition-all duration-300 placeholder:text-outline-variant" id="email" placeholder="name@vytalix.bio" type="email"/>
</div>
<div class="group">
<div class="flex justify-between items-center mb-2">
<label class="font-label-caps text-label-caps text-on-surface-variant transition-colors group-focus-within:text-primary-fixed-dim" for="password">ACCESS KEY</label>
<a class="font-label-caps text-[10px] text-primary-fixed-dim hover:text-primary-fixed transition-colors" href="#">FORGOT KEY?</a>
</div>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant py-4 px-0 text-on-surface focus:ring-0 focus:border-primary-fixed-dim transition-all duration-300 placeholder:text-outline-variant" id="password" placeholder="••••••••••••" type="password"/>
</div>
<button class="btn-glow w-full bg-primary-fixed-dim text-on-primary py-5 rounded-lg font-body-md font-bold text-base transition-all duration-300 hover:bg-primary-fixed active:scale-95 flex items-center justify-center gap-3">
                        Sync Environment
                        <span class="material-symbols-outlined text-[20px]">bolt</span>
</button>
</form>
<div class="mt-8 flex items-center gap-4">
<div class="h-px bg-white/10 flex-grow"></div>
<span class="font-label-caps text-[10px] text-on-surface-variant">OR CONNECT VIA</span>
<div class="h-px bg-white/10 flex-grow"></div>
</div>
<div class="mt-8">
<button class="w-full flex items-center justify-center gap-4 py-4 border border-white/10 rounded-lg hover:bg-white/5 transition-all group">

</svg>

<div class="absolute bottom-8 left-0 right-0 px-margin-desktop flex justify-between items-center opacity-40">

<div class="flex gap-6">
<a class="font-label-caps text-[10px] hover:text-white transition-colors" href="#">LEGAL</a>
<a class="font-label-caps text-[10px] hover:text-white transition-colors" href="#">SECURITY</a>
</div>

</main>
<!-- Interactive Cursor Dot (Atmospheric Effect) -->
<div class="fixed top-0 left-0 w-96 h-96 bg-primary-fixed-dim/5 rounded-full blur-[100px] pointer-events-none z-50 transform -translate-x-1/2 -translate-y-1/2 transition-opacity duration-500 opacity-0 lg:block hidden" id="cursor-glow"></div>
<script>
        const cursorGlow = document.getElementById('cursor-glow');
        
        window.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
            cursorGlow.style.opacity = '1';
        });

        document.addEventListener('mouseleave', () => {
            cursorGlow.style.opacity = '0';
        });

        // Simple magnetic effect for the main button
        const btn = document.querySelector('.btn-glow');
        btn.addEventListener('mousemove', (e) => {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px) scale(1.02)`;
        });

        btn.addEventListener('mouseleave', () => {
            btn.style.transform = `translate(0px, 0px) scale(1)`;
        });
    </script>
